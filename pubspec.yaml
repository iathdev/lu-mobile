name: lu_mobile
description: Prep Chinese Vocab - Vocabulary learning app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0
  flutter: ^3.32.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^7.0.0

  # Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Navigation
  go_router: ^17.1.0

  # Local storage
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.6.0+eol
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  path: ^1.9.1

  # Camera / Image
  camera: ^0.12.0+1
  image_picker: ^1.1.2

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^4.0.0+1
  freezed: ^3.2.3
  json_serializable: ^6.9.4
  drift_dev: ^2.22.1
  mocktail: ^1.0.4
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/

  # fonts:
  #   - family: NotoSansSC
  #     fonts:
  #       - asset: assets/fonts/NotoSansSC-Regular.ttf
